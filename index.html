<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schedule Demo - TallyPrime Features Unlock</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { 
            --primary: #0b589e; 
            --secondary: #ecc557;
            --error: #dc2626; 
            --whatsapp: #25D366;
        }

        /* --- PREMIUM ANIMATED BACKGROUND --- */
        body { 
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f0f4f8;
            overflow: hidden;
            position: relative;
        }

        /* Animated Blobs */
        .bg-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(11, 88, 158, 0.15) 0%, rgba(255,255,255,0) 70%);
            filter: blur(50px);
            z-index: -1;
            animation: move 20s infinite alternate;
        }
        .blob1 { top: -10%; left: -10%; }
        .blob2 { bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(236, 197, 87, 0.15) 0%, rgba(255,255,255,0) 70%); }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        /* Tech Grid Pattern */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(11, 88, 158, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(11, 88, 158, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* --- CONTAINER DESIGN --- */
        .container { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); /* Frosted Glass Effect */
            width: 95%; 
            max-width: 1000px; 
            padding: 30px 50px; 
            border-radius: 35px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-top: 10px solid var(--primary);
            box-sizing: border-box;
            position: relative;
        }

        h2 { color: var(--primary); margin: 0 0 5px; font-size: 28px; text-align: center; font-weight: 800; letter-spacing: -0.5px; }
        .sub-header { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 25px; font-weight: 600; }

        .section-label { 
            display: flex; align-items: center; font-weight: 800; 
            margin: 15px 0 12px; font-size: 11px; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 2px;
        }
        .section-label::after { content: ""; height: 1px; background: linear-gradient(to right, #e2e8f0, transparent); flex-grow: 1; margin-left: 10px; }

        .form-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .form-row > div { flex: 1; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .full { grid-column: span 2; }

        label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 13px; color: #1e293b; }

        input, select, textarea { 
            width: 100%; padding: 12px 18px; border: 1.5px solid rgba(11, 88, 158, 0.1); 
            border-radius: 12px; font-size: 15px; box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.8); transition: 0.3s; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 15px rgba(11, 88, 158, 0.1); }

        /* --- PREMIUM BUTTON --- */
        .btn-wa { 
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white; border: none; padding: 18px; width: 100%; border-radius: 18px; 
            font-size: 20px; font-weight: 800; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; gap: 12px; margin-top: 15px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3);
            text-transform: uppercase;
        }
        .btn-wa:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 20px 40px rgba(37, 211, 102, 0.4); }
        .btn-wa img { width: 24px; }

        .error-hint { color: var(--error); font-size: 11px; font-weight: 700; margin-top: 4px; display: none; }
        input.input-error { border-color: var(--error); background-color: #fff5f5; }

        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; padding: 15px; }
            .container { padding: 25px 20px; border-radius: 25px; width: 100%; }
            .form-row { flex-direction: column; gap: 15px; }
            .form-grid { grid-template-columns: 1fr !important; gap: 15px; }
            .full { grid-column: auto; }
            h2 { font-size: 22px; }
            .btn-wa { padding: 14px; font-size: 17px; }
        }
    </style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>

<div class="container">
    <h2>Schedule Demo</h2>
    <p class="sub-header">TallyPrime Features Unlock Request</p>

    <form id="demoForm">
        <span class="section-label">1. Booking Schedule</span>
        <div class="form-row">
            <div>
                <label>Demo Mode</label>
                <select id="demoMode" onchange="updateDateTimeLogic()" required>
                    <option value="Online">Online (Google Meet / Zoom)</option>
                    <option value="Offline">Offline (On-site Visit)</option>
                </select>
            </div>
            <div class="form-row" style="margin-bottom:0; flex: 2.5;">
                <div style="flex:1.2;">
                    <label>Date</label>
                    <input type="date" id="demoDate" onchange="generateAvailableTimes()" required>
                </div>
                <div style="flex:1;">
                    <label>Time Slot</label>
                    <select id="demoTime" required></select>
                </div>
            </div>
        </div>

        <span class="section-label">2. Software Details</span>
        <div class="form-grid">
            <div>
                <label>Tally Flavour</label>
                <select id="flavour" required>
                    <option value="Silver (Single User)">Silver (Single User)</option>
                    <option value="Gold (Multi User)">Gold (Multi User)</option>
                </select>
            </div>
            <div>
                <label>Serial Number</label>
                <input type="text" id="licenseNo" maxlength="9" placeholder="Tally License Number" required>
                <div id="licError" class="error-hint">⚠️ Invalid Serial Number (Calculation Check Failed)</div>
            </div>
        </div>

        <span class="section-label">3. Contact Information</span>
        <div class="form-grid">
            <div class="full"><label>Company Name</label><input type="text" id="companyName" placeholder="Enter Full Company Name" required></div>
            <div><label>Contact Person</label><input type="text" id="personName" placeholder="Person Name" required></div>
            <div><label>Contact Number</label><input type="tel" id="personPhone" pattern="[0-9]{10}" placeholder="10 Digit Mobile Number" required></div>
            <div class="full"><label>Any Special Request</label><textarea id="suggestions" rows="1" placeholder="Describe your specific requirement..."></textarea></div>
        </div>

        <button type="submit" class="btn-wa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            CONFIRM & SEND REQUEST
        </button>
    </form>
</div>

<script>
    const datePicker = document.getElementById('demoDate');
    const timePicker = document.getElementById('demoTime');
    const modeSelect = document.getElementById('demoMode');

    function updateDateTimeLogic() {
        const now = new Date();
        const hour = now.getHours();
        const mode = modeSelect.value;
        let minDate = new Date();
        if (mode === "Offline" && hour >= 14) minDate.setDate(now.getDate() + 1);
        else if (mode === "Online" && hour >= 18) minDate.setDate(now.getDate() + 1);
        datePicker.min = minDate.toISOString().split('T')[0];
        generateAvailableTimes();
    }

    function generateAvailableTimes() {
        timePicker.innerHTML = "";
        const now = new Date();
        const isToday = (datePicker.value === now.toISOString().split('T')[0]);
        for (let h = 11; h <= 19; h++) {
            for (let m of ['00', '30']) {
                if (h === 19 && m === '30') break;
                if (isToday && (h < now.getHours() || (h === now.getHours() && parseInt(m) <= now.getMinutes()))) continue; 
                let displayH = h > 12 ? h - 12 : h;
                let ampm = h >= 12 ? 'PM' : 'AM';
                timePicker.add(new Option(`${displayH}:${m} ${ampm}`, `${h}:${m}`));
            }
        }
    }

    function getDigitalRoot(n) {
        if (!n || n.length !== 9) return 0;
        let sum = n.split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
        while (sum > 9) { sum = sum.toString().split('').reduce((a, b) => parseInt(a) + parseInt(b), 0); }
        return sum;
    }

    document.getElementById('demoForm').onsubmit = function(e) {
        e.preventDefault();
        const licInput = document.getElementById('licenseNo');
        const licError = document.getElementById('licError');
        const root = getDigitalRoot(licInput.value);
        const isValid = (licInput.value.length === 9 && root === 9);
        let finalLicense = licInput.value;

        if(!isValid) {
            licError.style.display = "block";
            licInput.classList.add('input-error');
            finalLicense += " (Invalid License)";
        } else {
            licError.style.display = "none";
            licInput.classList.remove('input-error');
        }

        const dateParts = datePicker.value.split("-");
        const formattedDate = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;

        const msg = `*NEW DEMO BOOKING*%0A--------------------------%0A*Mode:* ${modeSelect.value}%0A*Date:* ${formattedDate}%0A*Time:* ${timePicker.options[timePicker.selectedIndex].text}%0A--------------------------%0A*Flavour:* ${document.getElementById('flavour').value}%0A*Serial:* ${finalLicense}%0A--------------------------%0A*Company:* ${document.getElementById('companyName').value}%0A*Name:* ${document.getElementById('personName').value}%0A*Mobile:* ${document.getElementById('personPhone').value}%0A*Note:* ${document.getElementById('suggestions').value}`;

        window.open(`https://wa.me/919875126637?text=${msg}`, '_blank');
        
        Swal.fire({
            title: isValid ? 'Forwarded!' : 'Sent with Warning',
            text: isValid ? 'Opening WhatsApp...' : 'Request sent, but serial validation failed.',
            icon: isValid ? 'success' : 'warning',
            confirmButtonColor: '#0b589e'
        });
    };

    updateDateTimeLogic();
</script>
</body>
</html>
