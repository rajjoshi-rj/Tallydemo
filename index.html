<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schedule Demo - TallyPrime Features Unlock</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { 
            --primary: #0b589e; 
            --bg-dark: #d1c4a9; 
            --error: #dc2626; 
            --whatsapp: #25D366;
        }

        body { 
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #d1c4a9 0%, #b8ac91 100%);
            background-image: 
                radial-gradient(at 0% 0%, rgba(11, 88, 158, 0.15) 0px, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%230b589e' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            overflow: hidden;
        }

        .container { 
            background: rgba(255, 255, 255, 0.98); 
            width: 95%; 
            max-width: 900px; 
            padding: 20px 35px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            border-top: 8px solid var(--primary);
            box-sizing: border-box;
        }

        h2 { color: var(--primary); margin: 0 0 5px; font-size: 22px; text-align: center; font-weight: 800; }
        .sub-header { text-align: center; color: #64748b; font-size: 12px; margin-bottom: 15px; font-weight: 600; }

        .section-label { 
            display: flex; align-items: center; font-weight: 800; 
            margin: 12px 0 8px; font-size: 10px; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8;
        }
        .section-label::after { content: ""; height: 1px; background: #e2e8f0; flex-grow: 1; margin-left: 10px; }

        .form-row { display: flex; gap: 15px; margin-bottom: 10px; }
        .form-row > div { flex: 1; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .full { grid-column: span 2; }

        label { display: block; font-weight: 700; margin-bottom: 4px; font-size: 11px; color: #1e293b; }

        input, select, textarea { 
            width: 100%; padding: 10px 14px; border: 1.5px solid #edf2f7; 
            border-radius: 10px; font-size: 14px; box-sizing: border-box; 
            background: #fdfdfd; transition: 0.2s; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn-wa { 
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; 
            font-size: 18px; font-weight: 800; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; gap: 10px; margin-top: 10px;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }
        .btn-wa:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(37, 211, 102, 0.3); }
        .btn-wa img { width: 20px; }

        .error-hint { color: var(--error); font-size: 10px; font-weight: 700; margin-top: 2px; display: none; }
        input.input-error { border-color: var(--error); background-color: #fff5f5; }

        /* Responsive Mobile Adjustments */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; padding: 10px; }
            .container { padding: 15px; border-radius: 20px; width: 100%; }
            .form-row { flex-direction: column; gap: 10px; }
            .form-grid { grid-template-columns: 1fr !important; gap: 10px; }
            .full { grid-column: auto; }
            h2 { font-size: 19px; }
            .sub-header { margin-bottom: 10px; }
            label { font-size: 10px; }
            input, select, textarea { padding: 8px 12px; font-size: 13px; }
            .section-label { margin: 10px 0 5px; }
            .btn-wa { padding: 12px; font-size: 15px; margin-top: 15px; }
            .btn-wa img { width: 18px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Schedule Demo</h2>
    <p class="sub-header">TallyPrime Features Unlock Request</p>

    <form id="demoForm">
        <span class="section-label">1. Booking Schedule</span>
        <div class="form-row">
            <div>
                <label>Demo Mode</label>
                <select id="demoMode" onchange="updateDateTimeLogic()" required>
                    <option value="Online">Online (Google Meet / Zoom)</option>
                    <option value="Offline">Offline (On-site Visit)</option>
                </select>
            </div>
            <div class="form-row" style="margin-bottom:0; flex: 2;">
                <div style="flex:1;">
                    <label>Date</label>
                    <input type="date" id="demoDate" onchange="generateAvailableTimes()" required>
                </div>
                <div style="flex:1;">
                    <label>Time Slot</label>
                    <select id="demoTime" required></select>
                </div>
            </div>
        </div>

        <span class="section-label">2. Software Details</span>
        <div class="form-grid">
            <div>
                <label>Tally Flavour</label>
                <select id="flavour" required>
                    <option value="Silver (Single User)">Silver (Single User)</option>
                    <option value="Gold (Multi User)">Gold (Multi User)</option>
                </select>
            </div>
            <div>
                <label>Tally License Number</label>
                <input type="text" id="licenseNo" maxlength="9" placeholder="9 Digits" required>
                <div id="licError" class="error-hint">⚠️ Invalid Serial Number</div>
            </div>
        </div>

        <span class="section-label">3. Contact Information</span>
        <div class="form-grid">
            <div class="full"><label>Company Name</label><input type="text" id="companyName" placeholder="Enter Company Name" required></div>
            <div><label>Contact Person</label><input type="text" id="personName" placeholder="Name" required></div>
            <div><label>WhatsApp Number</label><input type="tel" id="personPhone" pattern="[0-9]{10}" placeholder="10 Digits" required></div>
            <div class="full"><label>Any Special Request</label><textarea id="suggestions" rows="1" placeholder="Briefly describe your request..."></textarea></div>
        </div>

        <button type="submit" class="btn-wa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            CONFIRM & SEND REQUEST
        </button>
    </form>
</div>

<script>
    const datePicker = document.getElementById('demoDate');
    const timePicker = document.getElementById('demoTime');
    const modeSelect = document.getElementById('demoMode');

    function updateDateTimeLogic() {
        const now = new Date();
        const hour = now.getHours();
        const mode = modeSelect.value;
        let minDate = new Date();
        if (mode === "Offline" && hour >= 14) minDate.setDate(now.getDate() + 1);
        else if (mode === "Online" && hour >= 18) minDate.setDate(now.getDate() + 1);
        datePicker.min = minDate.toISOString().split('T')[0];
        generateAvailableTimes();
    }

    function generateAvailableTimes() {
        timePicker.innerHTML = "";
        const now = new Date();
        const isToday = (datePicker.value === now.toISOString().split('T')[0]);
        for (let h = 11; h <= 19; h++) {
            for (let m of ['00', '30']) {
                if (h === 19 && m === '30') break;
                if (isToday && (h < now.getHours() || (h === now.getHours() && parseInt(m) <= now.getMinutes()))) continue; 
                let displayH = h > 12 ? h - 12 : h;
                let ampm = h >= 12 ? 'PM' : 'AM';
                timePicker.add(new Option(`${displayH}:${m} ${ampm}`, `${h}:${m}`));
            }
        }
    }

    function getDigitalRoot(n) {
        if (!n || n.length !== 9) return 0;
        let sum = n.split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
        while (sum > 9) { sum = sum.toString().split('').reduce((a, b) => parseInt(a) + parseInt(b), 0); }
        return sum;
    }

    document.getElementById('demoForm').onsubmit = function(e) {
        e.preventDefault();
        const licInput = document.getElementById('licenseNo');
        const licError = document.getElementById('licError');
        const root = getDigitalRoot(licInput.value);
        const isValid = (licInput.value.length === 9 && root === 9);
        let finalLicense = licInput.value;

        if(!isValid) {
            licError.style.display = "block";
            licInput.classList.add('input-error');
            finalLicense += " (Invalid License)";
        } else {
            licError.style.display = "none";
            licInput.classList.remove('input-error');
        }

        const dateParts = datePicker.value.split("-");
        const formattedDate = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;

        const msg = `*NEW DEMO BOOKING*%0A--------------------------%0A*Mode:* ${modeSelect.value}%0A*Date:* ${formattedDate}%0A*Time:* ${timePicker.options[timePicker.selectedIndex].text}%0A--------------------------%0A*Flavour:* ${document.getElementById('flavour').value}%0A*Serial:* ${finalLicense}%0A--------------------------%0A*Company:* ${document.getElementById('companyName').value}%0A*Name:* ${document.getElementById('personName').value}%0A*Mobile:* ${document.getElementById('personPhone').value}%0A*Note:* ${document.getElementById('suggestions').value}`;

        window.open(`https://wa.me/919875126637?text=${msg}`, '_blank');
        
        Swal.fire({
            title: isValid ? 'Forwarded!' : 'Sent with Error',
            text: isValid ? 'Opening WhatsApp...' : 'Request sent, but serial logic check failed.',
            icon: isValid ? 'success' : 'warning',
            confirmButtonColor: '#0b589e'
        });
    };

    updateDateTimeLogic();
</script>
</body>
</html>
