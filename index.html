<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schedule Demo - Prajapati Computers</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { 
            --primary: #0b589e; 
            --whatsapp: #25D366;
            --gmail: #EA4335;
            --outlook: #0078d4;
            --yahoo: #6001d2;
        }

        body { 
            margin: 0; padding: 10px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f0f4f8; overflow-x: hidden; position: relative;
        }

        .bg-blob {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(11, 88, 158, 0.15) 0%, rgba(255,255,255,0) 70%);
            filter: blur(50px); z-index: -1; animation: move 20s infinite alternate;
        }
        .blob1 { top: -10%; left: -10%; }
        .blob2 { bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(236, 197, 87, 0.15) 0%, rgba(255,255,255,0) 70%); }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        .container { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            width: 95%; max-width: 950px; padding: 40px 50px; 
            border-radius: 40px; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.18); 
            border: 1.5px solid rgba(255, 255, 255, 0.6); border-top: 12px solid var(--primary);
            box-sizing: border-box; position: relative;
        }

        h2 { color: var(--primary); margin: 0 0 8px; font-size: 34px; text-align: center; font-weight: 800; }
        .sub-header { text-align: center; color: #64748b; font-size: 16px; margin-bottom: 30px; font-weight: 600; }

        .section-label { 
            display: flex; align-items: center; font-weight: 800; 
            margin: 20px 0 15px; font-size: 13px; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 2.5px;
        }
        .section-label::after { content: ""; height: 1.5px; background: #e2e8f0; flex-grow: 1; margin-left: 15px; }

        .form-row { display: flex; gap: 25px; margin-bottom: 20px; }
        .form-row > div { flex: 1; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 20px; }
        .full { grid-column: span 2; }

        label { display: block; font-weight: 800; margin-bottom: 8px; font-size: 15px; color: #1e293b; }

        input, select, textarea { 
            width: 100%; padding: 14px 20px; border: 2px solid rgba(11, 88, 158, 0.1); 
            border-radius: 14px; font-size: 16px; box-sizing: border-box; background: #fff; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(11, 88, 158, 0.05); }

        .terms-box {
            background: #f8fafc; padding: 15px; border-radius: 12px;
            font-size: 13px; color: #64748b; margin-bottom: 20px;
            display: flex; align-items: flex-start; gap: 10px; border: 1px solid #e2e8f0;
        }
        .terms-box input { width: auto; margin-top: 3px; cursor: pointer; }

        .button-group-slim { display: flex; gap: 12px; margin-top: 25px; justify-content: center; }
        
        .btn-slim { 
            flex: 1; border: none; padding: 15px 5px; border-radius: 16px; 
            font-size: 13px; font-weight: 800; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            gap: 10px; color: white; white-space: nowrap; transition: 0.3s;
            text-transform: uppercase; font-family: inherit;
        }

        .btn-slim i { font-size: 20px; }
        .btn-slim.wa { background: var(--whatsapp); }
        .btn-slim.gmail { background: var(--gmail); }
        .btn-slim.outlook { background: var(--outlook); }
        .btn-slim.yahoo { background: var(--yahoo); }

        .btn-slim:hover:not(:disabled) { transform: translateY(-4px); filter: brightness(1.1); }
        .btn-slim:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 768px) {
            .container { padding: 30px 20px; border-radius: 30px; }
            h2 { font-size: 26px; }
            .form-row, .form-grid { flex-direction: column; display: block; }
            .form-row > div, .form-grid > div { margin-bottom: 15px; }
            .button-group-slim { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
            .btn-slim { padding: 18px 5px; }
        }
    </style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>

<div class="container">
    <h2>Schedule Demo</h2>
    <p class="sub-header">TallyPrime Features Unlock Request</p>

    <form id="demoForm">
        <span class="section-label">1. Booking Schedule</span>
        <div class="form-row">
            <div>
                <label>Demo Mode</label>
                <select id="demoMode" onchange="updateDateTimeLogic()" required>
                    <option value="Online">Online (Google Meet / Zoom)</option>
                    <option value="Offline">Offline (On-site Visit)</option>
                </select>
            </div>
            <div class="form-row" style="margin-bottom:0; flex: 2.5;">
                <div style="flex:1.2;">
                    <label>Date</label>
                    <input type="date" id="demoDate" onchange="generateAvailableTimes()" required>
                </div>
                <div style="flex:1;">
                    <label>Time Slot</label>
                    <select id="demoTime" required></select>
                </div>
            </div>
        </div>

        <span class="section-label">2. Software Details</span>
        <div class="form-grid">
            <div>
                <label>Tally Flavour</label>
                <select id="flavour" required>
                    <option value="Silver (Single User)">Silver (Single User)</option>
                    <option value="Gold (Multi User)">Gold (Multi User)</option>
                </select>
            </div>
            <div>
                <label>Serial Number</label>
                <input type="text" id="licenseNo" maxlength="9" placeholder="Tally License Number" required>
            </div>
        </div>

        <span class="section-label">3. Contact Information</span>
        <div class="form-grid">
            <div class="full">
                <label>Company Name</label>
                <input type="text" id="companyName" placeholder="Enter Full Company Name" required>
            </div>
            <div>
                <label>Contact Person</label>
                <input type="text" id="personName" placeholder="Person Name" required>
            </div>
            <div>
                <label>Contact Number</label>
                <input type="tel" id="personPhone" pattern="[0-9]{10}" placeholder="10 Digit Mobile Number" required>
            </div>
            <div class="full">
                <label>Any Request</label>
                <textarea id="suggestions" rows="1" placeholder="Describe requirement..."></textarea>
            </div>
        </div>

        <div class="terms-box">
            <input type="checkbox" id="termsCheck" onchange="toggleButtons()">
            <label for="termsCheck" style="margin:0; font-weight:500;">I agree to the <span style="color:var(--primary); font-weight:700;">Terms & Conditions</span>. I understand that this information will be used solely for scheduling a product demonstration by Prajapati Computers.</label>
        </div>

        <div class="button-group-slim">
            <button type="button" id="btn-wa" onclick="sendRequest('whatsapp')" class="btn-slim wa" disabled>
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </button>
            <button type="button" id="btn-gmail" onclick="sendRequest('gmail')" class="btn-slim gmail" disabled>
                <i class="fa-solid fa-envelope"></i> Gmail
            </button>
            <button type="button" id="btn-outlook" onclick="sendRequest('outlook')" class="btn-slim outlook" disabled>
                <i class="fa-solid fa-paper-plane"></i> Outlook
            </button>
            <button type="button" id="btn-yahoo" onclick="sendRequest('yahoo')" class="btn-slim yahoo" disabled>
                <i class="fa-brands fa-yahoo"></i> Yahoo
            </button>
        </div>
    </form>
</div>

<script>
    const datePicker = document.getElementById('demoDate');
    const timePicker = document.getElementById('demoTime');
    const modeSelect = document.getElementById('demoMode');
    const termsCheck = document.getElementById('termsCheck');

    const targetEmail = "support@prajapaticomputers.in";
    const ccEmails = "info@prajapaticomputers.in, vishalprajapati@prajapaticomputers.in, sales@prajapaticomputers.in, accounts@prajapaticomputers.in";

    function toggleButtons() {
        const btns = ['btn-wa', 'btn-gmail', 'btn-outlook', 'btn-yahoo'];
        btns.forEach(id => document.getElementById(id).disabled = !termsCheck.checked);
    }

    function updateDateTimeLogic() {
        const now = new Date();
        let minDate = new Date();
        if (now.getHours() >= 17) minDate.setDate(now.getDate() + 1);
        datePicker.min = minDate.toISOString().split('T')[0];
        generateAvailableTimes();
    }

    function generateAvailableTimes() {
        timePicker.innerHTML = "";
        for (let h = 11; h <= 18; h++) {
            for (let m of ['00', '30']) {
                let displayH = h > 12 ? h - 12 : h;
                let ampm = h >= 12 ? 'PM' : 'AM';
                timePicker.add(new Option(`${displayH}:${m} ${ampm}`, `${h}:${m}`));
            }
        }
    }

    function sendRequest(platform) {
        const form = document.getElementById('demoForm');
        if (!form.checkValidity()) { form.reportValidity(); return; }

        const company = document.getElementById('companyName').value;
        const serial = document.getElementById('licenseNo').value;
        const sub = `Schedule Demo | ${company} | ${serial}`;
        
        const waMessage = `*NEW DEMO BOOKING REQUEST*\n` +
                        `--------------------------\n` +
                        `*Mode:* ${modeSelect.value}\n` +
                        `*Date:* ${datePicker.value}\n` +
                        `*Time:* ${timePicker.options[timePicker.selectedIndex].text}\n` +
                        `--------------------------\n` +
                        `*Flavour:* ${document.getElementById('flavour').value}\n` +
                        `*Serial:* ${serial}\n` +
                        `--------------------------\n` +
                        `*Company:* ${company}\n` +
                        `*Name:* ${document.getElementById('personName').value}\n` +
                        `*Mobile:* ${document.getElementById('personPhone').value}\n` +
                        `*Note:* ${document.getElementById('suggestions').value}`;

        const emailBody = waMessage.replace(/\*/g, '');

        if (platform === 'whatsapp') {
            window.open(`https://wa.me/919106593375?text=${encodeURIComponent(waMessage)}`, '_blank');
        } else if (platform === 'gmail') {
            window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${targetEmail}&cc=${encodeURIComponent(ccEmails)}&su=${encodeURIComponent(sub)}&body=${encodeURIComponent(emailBody)}`, '_blank');
        } else if (platform === 'outlook') {
            window.open(`https://outlook.office.com/mail/deeplink/compose?to=${targetEmail}&cc=${encodeURIComponent(ccEmails)}&subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(emailBody)}`, '_blank');
        } else if (platform === 'yahoo') {
            window.open(`https://compose.mail.yahoo.com/?to=${targetEmail}&cc=${encodeURIComponent(ccEmails)}&subj=${encodeURIComponent(sub)}&body=${encodeURIComponent(emailBody)}`, '_blank');
        }
    }

    updateDateTimeLogic();
</script>
</body>
</html>
